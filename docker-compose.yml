version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_DB: firegnn
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # only accessible locally, not exposed to internet

  api:
    build: .
    restart: always
    ports:
      - "127.0.0.1:8000:8000"   # Nginx will proxy to this
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@db:5432/firegnn
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - db

volumes:
  pgdata: